#####################################################################
######################## POWER CONTROL ##############################
#####################################################################
#you can use '#' symbol to comment or uncomment lines or statements
#this macro allows you to turn off the printer
[gcode_macro POWER_OFF_PRINTER]
gcode:
  tasmota_off
  host_shutdown
#this gcode shell command will shutdown the klippy host
[gcode_shell_command host_shutdown]
command: poweroff #for Rpi: sudo shutdown now
timeout: 3.
verbose: False

[gcode_macro HOST_SHUTDOWN]
gcode:
    RUN_SHELL_COMMAND CMD=host_shutdown
#this gcode shell command will shutdown the tasmota device using curl
[gcode_shell_command tasmota_off]
command: curl "http://192.168.1.21/cm?cmnd=Backlog%3BDelay%20300%3BPower%20OFF"
timeout: 2.
verbose: False
[gcode_macro TASMOTA_OFF]
gcode:
    RUN_SHELL_COMMAND CMD=tasmota_off


#####################################################################
# 	Led Light  Control
#####################################################################


[output_pin LED_pin]
pin: P2.7
pwm: True
value: 0

[gcode_macro LEDOFF]
gcode:  SET_PIN PIN=LED_pin VALUE=0


[gcode_macro LEDON]
gcode:  SET_PIN PIN=LED_pin VALUE=1













#####################################################################
# 	Sdcard
#####################################################################

[virtual_sdcard]
path: ~/printer_data/gcodes





#####################################################################
# 	Raspi Temp
#####################################################################

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100


########################################
# SKR 1.4 TURBO Section
########################################

[mcu]
serial:/dev/serial/by-id/usb-Klipper_lpc1768_269001136400D895AB3D4B62C42000F5-if00

[mcu EBBCan]
canbus_uuid: a99f57d2c3e7

[mcu mmu]
canbus_uuid: b225b0c8c8ec

########################################
# STEPPERS # TMC2209 configuration
########################################

[stepper_x]
step_pin: P2.2
dir_pin: P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0 
position_endstop: 0
position_max: 260
homing_speed: 30


[tmc2209 stepper_x]
uart_pin: P1.10
interpolate: False                   # 256 microstep interpolation (True/False)
run_current: 0.650                    # Motor run current (A)
sense_resistor: 0.110                # Do not change
stealthchop_threshold: 999999
diag_pin: ^P1.29
driver_SGTHRS: 71


[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: !P1.28
position_min: 0
position_endstop: 0
position_max: 245
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: P1.9
interpolate: False                   # 256 microstep interpolation (True/False)
run_current: 0.650                   # Motor run current (A)
sense_resistor: 0.110               # Do not change
stealthchop_threshold: 999999

[stepper_z]
step_pin: P0.22
dir_pin: P2.11
enable_pin: !P0.21
rotation_distance: 8         # Leadscrew pitch 8, change as needed
microsteps: 16
full_steps_per_rotation: 200  # Steps per revolution (1.8°: 200, 0.9°: 400)
endstop_pin: probe:z_virtual_endstop            # Endstop pin
position_max: 270           # Max soft limit (240mm-290mm-340mm)
position_min: -5            # Min soft limit (for nozzle cleaning, around -5)
homing_speed: 10              # Homing speed, max 20
second_homing_speed: 3        # Second homing speed, max 10
homing_retract_dist: 3        # Retract distance

[tmc2209 stepper_z]
uart_pin: P1.8
interpolate: false
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 999999    # StealthChop threshold (set to 0 to disable)

[tmc2209 stepper_z1]
uart_pin: P1.4
interpolate: false
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 999999


[stepper_z1]
step_pin: P2.13
dir_pin: P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200  # Steps per revolution (1.8°: 200, 0.9°: 400)


[bltouch]
sensor_pin: ^EBBCan:gpio21            # Signal pin
control_pin: EBBCan:gpio22             # Servo control
x_offset: 0                  # X offset from nozzle
y_offset: -14.9              # Y offset from nozzle
#z_offset: 0                  # Z offset from nozzle
pin_up_touch_mode_reports_triggered: true


#####################################################################
#                             Extruder Config
#####################################################################

[extruder]
step_pin: EBBCan:gpio18
dir_pin: !EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 32
full_steps_per_rotation: 200        # Steps per revolution (200 for 1.8°, 400 for 0.9°)
rotation_distance: 21.773         # Pulley circumference mm
gear_ratio: 50:10                   # Gear ratio (Galileo 7.5:1, comment out; BMG is 50:17, output shaft front, input shaft rear)
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type:  Generic 3950
sensor_pin: EBBCan:gpio27
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
max_power: 0.8
min_temp: 0
max_temp: 300
min_extrude_temp: 150               # Min extrude temp
pressure_advance: 0.04              # Pressure advance
pressure_advance_smooth_time:0.040  # Smoothing time, default 0.040
#control = pid
#pid_kp = 45.690
#pid_ki = 5.344
#pid_kd = 97.662

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
interpolate: False
run_current: 0.5
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#                            Heated Bed Config
#####################################################################

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25
#control: pid
#pid_kp = 44.703
#pid_ki = 0.563
#pid_kd = 886.799
min_temp: 0.000
max_temp: 130

#####################################################################
#                           Idle Bed Shutdown                       #
#####################################################################
[idle_timeout]
timeout: 1800                # Turn off bed after 30 min idle

#####################################################################
#                             Fan Config
#####################################################################

[fan]
pin: EBBCan:gpio13

[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 50.0



[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[input_shaper]
shaper_freq_x: 45.2
shaper_type_x: mzv
shaper_freq_y: 41.4
shaper_type_y: mzv







#####################################################################
#                               Homing                              #
#####################################################################
[safe_z_home]                # Z endstop coordinates
home_xy_position:115.10,128.00     # Z endstop position (IMPORTANT! Adjust as needed)
speed:50                    # Homing speed
z_hop:10                     # Z lift before homing
z_hop_speed: 5
#####################################################################

#####################################################################
#                              Bed Mesh Calibration
#####################################################################
#[bed_mesh]
#speed: 50                    # Calibration speed
#horizontal_move_z: 5         # Z lift before moving to next point
#mesh_min: 10,10              # Min calibration point x, y
#mesh_max: 190, 185           # Max calibration point x, y
#probe_count: 5,5             # Sample points (4x4 = 16 points)
#mesh_pps: 2,2                # Additional sample points
#algorithm: bicubic           # Algorithm model
#bicubic_tension: 0.2         # Do not change

#[bed_mesh]
#speed: 50
#horizontal_move_z: 5
#mesh_min: 6,7
#mesh_max: 225,203
#probe_count: 5,5

[bed_mesh]
speed: 60
horizontal_move_z: 6
mesh_min: 15,10.1
mesh_max: 225,195.1
probe_count: 5,5
mesh_pps: 2,2
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: bicubic 


#####################################################################
#                    screws_tilt_adjust Calibration
#####################################################################



[screws_tilt_adjust]
screw1: 204.10, 16     #screw coordinates need to be measure for YOUR specific printer
screw1_name: front left screw
screw2: 34.10, 16
screw2_name: front right screw
screw3: 34.10, 197.00
screw3_name: rear right screw
screw4: 204.10, 197.00
screw4_name: rear left screw
horizontal_move_z: 10
speed: 50   #speed of travel moves between screws
screw_thread: CW-M4  #measure your bed screw m3=3mm / m4=4mm / m5=5mm


########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=P1.30, EXP1_3=P1.18, EXP1_5=P1.20, EXP1_7=P1.22, EXP1_9=<GND>,
    EXP1_2=P0.28, EXP1_4=P1.19, EXP1_6=P1.21, EXP1_8=P1.23, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=P0.17, EXP2_3=P3.26, EXP2_5=P3.25, EXP2_7=P1.31, EXP2_9=<GND>,
    EXP2_2=P0.15, EXP2_4=P0.16, EXP2_6=P0.18, EXP2_8=<RST>, EXP2_10=<NC>
    # Pins EXP2_1, EXP2_6, EXP2_2 are also MISO, MOSI, SCK of bus "ssp0"

# See the sample-lcd.cfg file for definitions of common LCD displays.
[display]
lcd_type: st7920
cs_pin: EXP1_4
sclk_pin: EXP1_5
sid_pin: EXP1_3
encoder_pins: ^EXP2_3,^EXP2_5
click_pin: ^!EXP1_2


